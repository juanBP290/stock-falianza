(function () {
  function ensureToastUi(){

  function repairEncoding(text){

  function fixTextString(value){
    let text = repairEncoding(String(value||''));
    textReplacements.forEach(function(pair){
      text = text.split(pair[0]).join(pair[1]);
    });
    return text;
  }

  function cleanDisplayValue(value){
    const text = fixTextString(String(value == null ? '' : value)).trim();
    const stripped = text.replace(/[ГўГғГӮвӮ¬пҝҪЕ“вҖқвҖҳвҖҷ]/g, '').trim();
    if(!text || text==='-' || text==='вҖ”' || text==='ГўвӮ¬вҖқ' || text==='ГўвӮ¬' || !stripped || /^[-вҖ”вҖ“]+$/.test(text)) return 'вҖ”';
    return text;
  }

  function cleanseNodeText(root){
    if(!root) return;
    const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node){
        const parent=node && node.parentNode;
        if(!parent) return NodeFilter.FILTER_REJECT;
        const tag=(parent.tagName||'').toUpperCase();
        if(tag==='SCRIPT' || tag==='STYLE') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const textNodes=[];
    while(walker.nextNode()){
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach(function(node){
      const fixed=fixTextString(node.nodeValue);
      if(fixed!==node.nodeValue){
        node.nodeValue=fixed;
      }
    });

    root.querySelectorAll('input[placeholder],textarea[placeholder]').forEach(function(el){
      const ph = el.getAttribute('placeholder');
      const fixed=fixTextString(ph);
      if(fixed!==ph){
        el.setAttribute('placeholder', fixed);
      }
    });
  }

  function moveGeneralSearchToHistorial(){
    const searchInput=document.getElementById('searchAny');
    const hist=document.getElementById('tHist');
    if(!searchInput || !hist) return;
    const card=searchInput.closest('.card');
    if(!card || card.dataset.movedToHistorial==='1') return;
    card.dataset.movedToHistorial='1';
    const title=card.querySelector('h2');
    if(title) title.textContent='BГәsqueda general';
    hist.insertBefore(card, hist.firstChild);
  }

  function setFieldValue(id, prefix){
    const el = document.getElementById(id);
    if(!el) return;
    const current = fixTextString(el.textContent || '');
    if(prefix){
      let value = current;
      if(current.startsWith(prefix)){
        value = current.slice(prefix.length);
      }else if(current.indexOf(':') !== -1){
        value = current.split(':').slice(1).join(':');
      }
      el.textContent = prefix + cleanDisplayValue(value);
    }else{
      el.textContent = cleanDisplayValue(current);
    }
  }

  function applyStaticTextFixes(){
    document.title='Servicios - Taller Alianza';
    const gateTitle=document.querySelector('#gate .gate-card h1');
    const gateSub=document.querySelector('#gate .gate-card .sub');
    const ownerBtn=document.getElementById('rDueno');
    const assistBtn=document.getElementById('rAsist');
    const gatePass=document.getElementById('gatePass');
    if(gateTitle) gateTitle.textContent='Taller Alianza';
    if(gateSub) gateSub.textContent='Sistema de Servicios В· Chincha';
    if(ownerBtn) ownerBtn.textContent='DueГұo';
    if(assistBtn) assistBtn.textContent='Asistente';
    if(gatePass) gatePass.placeholder='ContraseГұa';

    const header=document.querySelector('.header h1');
    if(header) header.textContent='Servicios Alianza';
    const pill=document.getElementById('rolePill');
    if(pill){
      const txt=(pill.textContent||'').toUpperCase();
      if(txt.includes('ASIST')) pill.textContent='ASISTENTE';
      if(txt.includes('DUE') || txt.includes('DUEN')) pill.textContent='DUEГ‘O';
    }
    const tabs=document.querySelectorAll('.tab');
    if(tabs[0]) tabs[0].textContent='Buscar';
    if(tabs[1]) tabs[1].textContent='Historial';
    if(tabs[2]) tabs[2].textContent='VehГӯculos';
    if(tabs[3]) tabs[3].textContent='Nueva';
    if(tabs[4]) tabs[4].textContent='Archivo';
    if(tabs[5]) tabs[5].textContent='Config';

    const tag=document.querySelector('#printArea .tag');
    if(tag) tag.textContent='MecГЎnica Automotriz В· DiagnГіstico Especializado';
    const info=document.querySelectorAll('#printArea .info div');
    if(info[0]) info[0].textContent='MANTENIMIENTO PREVENTIVO Y CORRECTIVO DE VEHГҚCULOS';
    if(info[1]) info[1].textContent='VENTA DE REPUESTOS Y LUBRICANTES';
    const numLbl=document.querySelector('#printArea .pf-num .lbl');
    if(numLbl) numLbl.textContent='PROFORMA NRO.';
    const blocks=document.querySelectorAll('#printArea .pf-cli .blk h3');
    if(blocks[0]) blocks[0].textContent='CLIENTE';
    if(blocks[1]) blocks[1].textContent='VEHГҚCULO';
    const descHead=document.querySelector('#printArea table.pf-items thead th:nth-child(2)');
    if(descHead) descHead.textContent='DESCRIPCIГ“N';

    document.querySelectorAll('.card h2').forEach(function(el){
      const txt=(fixTextString(el.textContent)||'').toUpperCase();
      if(txt.includes('BUSCAR') && txt.includes('PLACA')) el.textContent='Buscar vehГӯculo por placa';
      else if(txt.includes('BUSQUEDA') && txt.includes('GENERAL')) el.textContent='BГәsqueda general';
      else if(txt.includes('DATOS DEL CLIENTE')) el.textContent='Datos del cliente';
      else if(txt.includes('VEH')) el.textContent='VehГӯculo';
      else if(txt.includes('ITEM')) el.textContent='Items / Servicios';
      else if(txt.includes('ARCHIVO')) el.textContent='Archivo de documentos';
      else if(txt.includes('CONFIG')) el.textContent='ConfiguraciГіn';
    });

    document.querySelectorAll('label').forEach(function(el){
      const txt=fixTextString(el.textContent);
      if(/PLACA/i.test(txt)) el.textContent='Placa';
      else if(/KILOMETR/i.test(txt)) el.textContent='Kilometraje';
      else if(/AГ‘O|ANO/i.test(txt)) el.textContent='AГұo';
      else if(/MARCA/i.test(txt) && /MODELO/i.test(txt)) el.textContent='Marca / Modelo';
      else if(/NOMBRE/i.test(txt)) el.textContent='Nombre / RazГіn Social';
      else if(/TEL/i.test(txt)) el.textContent='TelГ©fono';
      else if(/DIRE/i.test(txt)) el.textContent='DirecciГіn';
      else if(/DESCRIP/i.test(txt)) el.textContent='DescripciГіn';
      else if(/BUSQUEDA GENERAL|BГҡSQUEDA GENERAL/i.test(txt)) el.textContent='BГәsqueda general';
    });

    const btnEdit=document.getElementById('btnEditStored');
    const btnCancel=document.getElementById('btnCancelStored');
    const btnDelete=document.getElementById('btnDeleteStored');
    const btnSave=document.getElementById('btnSaveDb');
    const printCtrl=document.getElementById('printCtrl');
    if(printCtrl){
      const first=printCtrl.querySelector('button');
      if(first) first.textContent='Volver';
    }
    if(btnEdit) btnEdit.textContent='Editar';
    if(btnCancel && !(btnCancel.textContent||'').includes('Reactivar')) btnCancel.textContent='Anular';
    if(btnDelete) btnDelete.textContent='Eliminar';
    if(btnSave) btnSave.textContent='Guardar en BD';
    const printButtons=document.querySelectorAll('#printCtrl .btn');
    const lastBtn=printButtons[printButtons.length-1];
    if(lastBtn) lastBtn.textContent='Imprimir / PDF';

    moveGeneralSearchToHistorial();
    cleanseNodeText(document.body);
    fixPrintOutput();
  }

  function fixRenderedLineItems(){
    document.querySelectorAll('.li-desc-label').forEach(function(el){ el.textContent='DescripciГіn'; });
    document.querySelectorAll('.li-desc-input').forEach(function(el){ el.placeholder='ESCRIBA AQUГҚ LA DESCRIPCIГ“N'; });
    document.querySelectorAll('.li-del').forEach(function(el){ el.textContent='Г—'; });
    document.querySelectorAll('#lineItems input[placeholder]').forEach(function(el){
      if((el.placeholder||'').toUpperCase().includes('INTERNO')) el.placeholder='CГіd. Interno';
      if((el.placeholder||'').toUpperCase().includes('OEM')) el.placeholder='CГіd. OEM';

  function fixPrintOutput(){
    const printArea = document.getElementById('printArea');
    if(!printArea) return;
    setFieldValue('prnCliente', '');
    setFieldValue('prnDoc', 'DNI/RUC: ');
    setFieldValue('prnTel', 'Tel: ');
    setFieldValue('prnDir', 'Dir: ');

    setFieldValue('prnModelo', '');
    setFieldValue('prnKm', 'Km: ');
    cleanseNodeText(printArea);
  }

  function installBehaviorFixes(){
    window.showToast = showToast;

    if(typeof window.buildCurrentProforma === 'function' && !window.__textFixBuildWrapped){
      const originalBuild=window.buildCurrentProforma;
      window.buildCurrentProforma=function(){
        const pf=originalBuild();
        const lines=(pf.lines||[]).map(function(l){
          return {
            desc:fixTextString(String((l&&l.desc)||'')).trim().toUpperCase(),
            cint:fixTextString(String((l&&l.cint)||'')).trim().toUpperCase(),
            coem:fixTextString(String((l&&l.coem)||'')).trim().toUpperCase(),
            cant:parseFloat(l&&l.cant)||0,
            precio:parseFloat(l&&l.precio)||0
          };
        }).filter(function(l){ return l.desc; });
        const sub=lines.reduce(function(acc,l){ return acc+(l.cant*l.precio); },0);
        pf.lines=lines;
        pf.sub=sub;
        pf.tot=sub-(parseFloat(pf.ac1)||0)-(parseFloat(pf.ac2)||0);
        ['cliente','doc','tel','dir','placa','km','ano','modelo'].forEach(function(key){
          pf[key]=cleanDisplayValue(pf[key]);
        });
        return pf;
      };
      window.__textFixBuildWrapped = true;
    }

    if(typeof window.generarProforma === 'function' && !window.__textFixGenerarWrapped){
      const originalGenerar=window.generarProforma;
      window.generarProforma=function(){
        const currentLines=window.state ? window.state.lines : [];
        const valid=(currentLines||[]).filter(function(l){
          return fixTextString(String((l&&l.desc)||'')).trim();
        });
        if(valid.length===0){
          alert('Agrega al menos un item con descripciГіn');
          return;
        }
        return originalGenerar();
      };
      window.__textFixGenerarWrapped = true;
    }

    if(typeof window.renderPrintFromProforma === 'function' && !window.__textFixRenderWrapped){
      const originalRenderPrint=window.renderPrintFromProforma;
      window.renderPrintFromProforma=function(pf){
        const fixed=Object.assign({}, pf, {
          cliente: cleanDisplayValue(pf && pf.cliente),
          doc: cleanDisplayValue(pf && pf.doc),
          tel: cleanDisplayValue(pf && pf.tel),
          dir: cleanDisplayValue(pf && pf.dir),
          placa: cleanDisplayValue(pf && pf.placa),
          ano: cleanDisplayValue(pf && pf.ano),
          modelo: cleanDisplayValue(pf && pf.modelo),
          km: cleanDisplayValue(pf && pf.km)
        });
        originalRenderPrint(fixed);
        applyStaticTextFixes();
      };
      window.__textFixRenderWrapped = true;
    }

    if(typeof window.renderLines === 'function' && !window.__textFixLinesWrapped){
      const originalRenderLines=window.renderLines;
      window.renderLines=function(){
        originalRenderLines();
        fixRenderedLineItems();
      };
      window.__textFixLinesWrapped = true;
    }

    if(typeof window.renderPrintControls === 'function' && !window.__textFixPrintControlsWrapped){
      const originalRenderPrintControls=window.renderPrintControls;
      window.renderPrintControls=function(){
        originalRenderPrintControls();
        const btnCancel=document.getElementById('btnCancelStored');
        if(btnCancel){
          btnCancel.textContent=(window.state && window.state.currentProforma && window.state.currentProforma.cancelled) ? 'Reactivar' : 'Anular';
        }
        applyStaticTextFixes();
      };
      window.__textFixPrintControlsWrapped = true;
    }

    if(typeof window.renderProformasList === 'function' && !window.__textFixListWrapped){
      const originalRenderList=window.renderProformasList;
      window.renderProformasList=function(){
        originalRenderList();
        applyStaticTextFixes();
      };
      window.__textFixListWrapped = true;
    }

    if(typeof window.renderHistorial === 'function' && !window.__textFixHistWrapped){
      const originalRenderHistorial=window.renderHistorial;
      window.renderHistorial=function(){
        originalRenderHistorial();
        applyStaticTextFixes();
      };
      window.__textFixHistWrapped = true;
    }

    if(typeof window.enterApp === 'function' && !window.__textFixEnterWrapped){
      const originalEnterApp=window.enterApp;
      window.enterApp=function(){
        originalEnterApp();
        applyStaticTextFixes();
      };
      window.__textFixEnterWrapped = true;
    }
  }

  function mount(){
    ensureToastUi();
    installBehaviorFixes();
    applyStaticTextFixes();
    fixRenderedLineItems();
  }

  let mountTimer=null;
  function scheduleMount(){
    if(mountTimer) window.clearTimeout(mountTimer);
    mountTimer=window.setTimeout(function(){ mount(); },60);
  }

  window.addEventListener('load', function(){
    mount();
    const observer=new MutationObserver(function(){ scheduleMount(); });
    observer.observe(document.body,{childList:true,subtree:true,characterData:true});
    window.setInterval(mount,1200);
  });
})();
<\/script>`;

    if (!html.includes('</body>')) {
      throw new Error('La pГЎgina base no tiene </body>');
    }

    html = html.replace('</body>', patch + '\n</body>');
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    renderError(err.message);
  }
})();
