<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios - Taller Alianza</title>
<style>
body{margin:0;background:#0b0f17;color:#e5e7eb;font-family:"Segoe UI",sans-serif;display:grid;place-items:center;min-height:100vh}
.box{max-width:560px;padding:24px;border:1px solid #2a3850;border-radius:16px;background:#161e2e;box-shadow:0 20px 50px rgba(0,0,0,.28)}
.box h1{margin:0 0 10px;font-size:22px;color:#f59e0b}
.box p{margin:0;color:#94a3b8;line-height:1.5}
</style>
</head>
<body>
  <div class="box">
    <h1>Servicios Alianza</h1>
    <p>Cargando la versi├│n corregida de textos...</p>
  </div>
<script>
(async function () {
  function renderError(message) {
    document.body.innerHTML =
      '<div class="box"><h1>Error</h1><p>' +
      String(message || 'No se pudo cargar la p├бgina') +
      '</p></div>';
  }

  try {
    const response = await fetch('./busqueda-directa-v5.html', { cache: 'no-store' });
    if (!response.ok) {
      throw new Error('No se pudo abrir busqueda-directa-v5.html');
    }

    let html = await response.text();

    const patch = `<script>
(function () {
  function repairEncoding(text){
    let s = String(text == null ? '' : text);
    for (let i = 0; i < 3; i++) {
      if (!/[├Г├В├в]/.test(s)) break;
      try {
        const decoded = decodeURIComponent(escape(s));
        if (decoded && decoded !== s) s = decoded;
        else break;
      } catch (e) {
        break;
      }
    }
    return s;
  }

  const replacements = [
    ['├втВмтАЭ', 'тАФ'],
    ['├втВмтАЬ', 'тАУ'],
    ['├втВм┼У', 'тАЬ'],
    ['├втВм┬Э', 'тАЭ'],
    ['├втВм╦Ь', 'тАШ'],
    ['├втВмтДв', 'тАЩ'],
    ['├втВм┬в', 'тАв'],
    ['├В┬░', '┬░'],
    ['N├В┬░', 'N┬░'],
    ['A├Г┬║n', 'A├║n'],
    ['a├Г┬║n', 'a├║n'],
    ['p├Г┬бgina', 'p├бgina'],
    ['versi├Г┬│n', 'versi├│n'],
    ['Raz├Г┬│n', 'Raz├│n'],
    ['N├Г┬║mero', 'N├║mero'],
    ['Configuraci├Г┬│n', 'Configuraci├│n'],
    ['Direcci├Г┬│n', 'Direcci├│n'],
    ['Tel├Г┬йfono', 'Tel├йfono'],
    ['Veh├Г┬нculo', 'Veh├нculo'],
    ['Veh├Г┬нculos', 'Veh├нculos'],
    ['B├Г┬║squeda', 'B├║squeda'],
    ['Contrase├Г┬▒a', 'Contrase├▒a'],
    ['Descripci├Г┬│n', 'Descripci├│n'],
    ['C├Г┬│digo', 'C├│digo'],
    ['A├Г┬▒o', 'A├▒o'],
    ['Mec├Г┬бnica', 'Mec├бnica'],
    ['Diagn├Г┬│stico', 'Diagn├│stico']
  ];

  function fixTextString(value){
    let text = repairEncoding(String(value == null ? '' : value));
    replacements.forEach(function(pair){
      text = text.split(pair[0]).join(pair[1]);
    });
    return text;
  }

  function cleanDisplayValue(value){
    const text = fixTextString(String(value == null ? '' : value)).trim();
    const stripped = text.replace(/[├в├Г├ВтВмя┐╜┼УтАЭтАШтАЩ]/g, '').trim();
    if (!text || text === '-' || text === 'тАФ' || text === '├втВмтАЭ' || text === '├втВм' || !stripped || /^[-тАФтАУ]+$/.test(text)) {
      return 'тАФ';
    }
    return text;
  }

  function cleanseNodeText(root){
    if(!root) return;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node){
        const parent = node && node.parentNode;
        if(!parent) return NodeFilter.FILTER_REJECT;
        const tag = (parent.tagName || '').toUpperCase();
        if(tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const textNodes = [];
    while(walker.nextNode()){
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach(function(node){
      const fixed = fixTextString(node.nodeValue);
      if (fixed !== node.nodeValue) node.nodeValue = fixed;
    });

    root.querySelectorAll('input[placeholder],textarea[placeholder]').forEach(function(el){
      const ph = el.getAttribute('placeholder');
      const fixed = fixTextString(ph);
      if (fixed !== ph) el.setAttribute('placeholder', fixed);
    });
  }

  function setFieldValue(id, prefix){
    const el = document.getElementById(id);
    if(!el) return;
    const current = fixTextString(el.textContent || '');
    if(prefix){
      let value = current;
      if (current.startsWith(prefix)) {
        value = current.slice(prefix.length);
      } else if (current.indexOf(':') !== -1) {
        value = current.split(':').slice(1).join(':');
      }
      el.textContent = prefix + cleanDisplayValue(value);
    } else {
      el.textContent = cleanDisplayValue(current);
    }
  }

  function fixPrintOutput(){
    const printArea = document.getElementById('printArea');
    if(!printArea) return;

    setFieldValue('prnCliente', '');
    setFieldValue('prnDoc', 'DNI/RUC: ');
    setFieldValue('prnTel', 'Tel: ');
    setFieldValue('prnDir', 'Dir: ');
    setFieldValue('prnPlaca', '');
    setFieldValue('prnAno', 'A├▒o: ');
    setFieldValue('prnModelo', '');
    setFieldValue('prnKm', 'Km: ');

    cleanseNodeText(printArea);
  }

  function patchRenderFunctions(){
    if (typeof window.renderPrintFromProforma === 'function' && !window.__textFixRenderWrapped) {
      const original = window.renderPrintFromProforma;
      window.renderPrintFromProforma = function(pf){
        const fixed = Object.assign({}, pf);
        ['cliente','doc','tel','dir','placa','ano','modelo','km'].forEach(function(k){
          fixed[k] = cleanDisplayValue(fixed[k]);
        });
        original(fixed);
        fixPrintOutput();
        scheduleMount();
      };
      window.__textFixRenderWrapped = true;
    }

    if (typeof window.renderProformasList === 'function' && !window.__textFixListWrapped) {
      const original = window.renderProformasList;
      window.renderProformasList = function(){
        original();
        scheduleMount();
      };
      window.__textFixListWrapped = true;
    }

    if (typeof window.renderHistorial === 'function' && !window.__textFixHistWrapped) {
      const original = window.renderHistorial;
      window.renderHistorial = function(){
        original();
        scheduleMount();
      };
      window.__textFixHistWrapped = true;
    }
  }

  function mount(){
    patchRenderFunctions();
    cleanseNodeText(document.body);
    fixPrintOutput();

    document.querySelectorAll('.empty').forEach(function(el){
      el.textContent = fixTextString(el.textContent || '');
    });
  }

  let mountTimer = null;
  function scheduleMount(){
    if (mountTimer) clearTimeout(mountTimer);
    mountTimer = setTimeout(mount, 60);
  }

  window.addEventListener('load', function(){
    mount();
    const observer = new MutationObserver(function(){
      scheduleMount();
    });
    observer.observe(document.body, { childList:true, subtree:true, characterData:true });
    setInterval(mount, 1200);
  });
})();
<\/script>`;

    if (!html.includes('</body>')) {
      throw new Error('La p├бgina base no tiene </body>');
    }

    html = html.replace('</body>', patch + '\n</body>');
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    renderError(err.message);
  }
})();
</script>
</body>
</html>
