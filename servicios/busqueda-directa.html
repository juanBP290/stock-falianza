<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Servicios · Taller Alianza</title>
<style>
:root{--bg:#0b0f17;--bg2:#111827;--card:#161e2e;--card2:#1e2a3f;--border:#2a3850;--text:#e5e7eb;--muted:#94a3b8;--accent:#f59e0b;--accent2:#fbbf24;--ok:#22c55e;--warn:#ef4444}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#0b0f17 0%,#1e2a3f 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.gate-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:340px}
.gate-card h1{margin:0 0 4px;font-size:22px;color:var(--accent)}
.gate-card .sub{color:var(--muted);font-size:12px;margin-bottom:24px}
.gate-card .role-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.role-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:10px;font-weight:600;font-size:14px}
.role-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.gate-card input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;margin-bottom:12px}
.gate-card .enter{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:700;font-size:15px}
.gate-msg{color:var(--warn);font-size:12px;text-align:center;min-height:16px;margin-top:8px}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px}
.header h1{margin:0;font-size:16px;color:var(--accent);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-pill{font-size:10px;padding:4px 8px;border-radius:20px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-weight:600}
.role-pill.dueno{background:rgba(245,158,11,.15);color:var(--accent);border-color:var(--accent)}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:6px;font-size:11px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:12px 6px;background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.view{display:none;padding:16px;max-width:1100px;margin:0 auto}
.view.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card h2{margin:0 0 12px;font-size:14px;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px}
.field textarea{min-height:60px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px 16px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;width:100%}
.btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.ok{background:var(--ok);color:#000}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}
.veh-info{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer}
.veh-info .placa{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:2px}
.veh-info .det{color:var(--muted);font-size:12px;margin-top:4px}
.veh-info .hint{color:var(--accent2);font-size:11px;margin-top:8px;font-style:italic}
.svc-list{display:flex;flex-direction:column;gap:8px}
.svc-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer}
.svc-item:hover{border-color:var(--accent)}
.svc-item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.svc-item .fecha{font-size:11px;color:var(--accent2);font-weight:700}
.svc-item .placa-tag{font-size:11px;color:var(--accent);font-weight:700}
.svc-item .km{font-size:11px;color:var(--muted)}
.svc-item .desc{font-size:13px;line-height:1.4;margin-bottom:6px}
.svc-item .codes{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;color:var(--muted)}
.svc-item .code-tag{background:var(--bg2);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.svc-item .total{font-size:14px;font-weight:700;color:var(--ok);text-align:right;margin-top:6px}
.proforma-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:10px;padding:2px 6px;border-radius:999px;border:1px solid var(--border);background:var(--bg2);color:var(--muted)}
.badge.ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--ok)}
.badge.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:var(--accent)}
.badge.cancel{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:var(--warn)}
.veh-add-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.veh-add-grid .field{margin-bottom:0}
.svc-item .cli{font-size:12px;color:var(--text);margin-top:4px}
.empty{text-align:center;color:var(--muted);padding:30px 16px;font-size:13px}
.loading{text-align:center;color:var(--muted);padding:20px;font-size:12px}
.line-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.line-item .li-top{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.line-item .li-del{background:transparent;border:none;color:var(--warn);font-size:18px;padding:0 4px}
.line-item .li-desc-label{display:block;color:var(--accent2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.line-item .li-desc-input{flex:1;width:100%;box-sizing:border-box;padding:9px 10px;background:rgba(245,158,11,.08);border:2px solid var(--accent);border-radius:7px;color:var(--text);font-size:13px;text-transform:uppercase;box-shadow:0 0 0 1px rgba(245,158,11,.15) inset}
.line-item .li-desc-input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 2px rgba(245,158,11,.18)}
.uppercase-input{text-transform:uppercase}
.line-item .li-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px}
.line-item .li-row>div{min-width:0}
.line-item .li-row input{width:100%;box-sizing:border-box;padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;text-align:right}
.line-item .li-row label{display:block;color:var(--muted);font-size:9px;text-transform:uppercase;margin-bottom:2px}
.totals-box{background:var(--card2);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-top:14px}
.totals-box .tot-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.totals-box .tot-row.big{font-size:18px;font-weight:800;color:var(--accent);border-top:1px solid var(--border);margin-top:6px;padding-top:10px}
.data-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card2);border-radius:8px;overflow:hidden}
.data-table th{background:var(--bg2);color:var(--accent);padding:8px 6px;text-align:left;font-size:10px;text-transform:uppercase;position:sticky;top:0;border-bottom:2px solid var(--border)}
.data-table td{padding:7px 6px;border-bottom:1px solid var(--border);color:var(--text)}
.data-table tr:hover td{background:rgba(245,158,11,.05)}
.data-table .placa-cell{color:var(--accent);font-weight:700}
.table-wrap{overflow-x:auto;max-height:70vh;border:1px solid var(--border);border-radius:8px}
#printArea{display:none}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{display:block!important;position:absolute;left:0;top:0;width:210mm;background:#fff;color:#000}@page{size:A4;margin:12mm}}
#printArea{background:#fff;color:#000;padding:12mm;font-family:Arial,sans-serif;font-size:12px;position:relative;width:210mm;min-height:297mm;margin:20px auto;box-shadow:0 0 30px rgba(0,0,0,.5)}
#printArea .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);font-size:120px;color:rgba(220,40,40,.1);font-weight:900;letter-spacing:8px;pointer-events:none;z-index:0;white-space:nowrap}
#printArea .pf-content{position:relative;z-index:1}
#printArea .pf-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #f59e0b;padding-bottom:10px;margin-bottom:14px}
#printArea .pf-head .biz h1{margin:0;font-size:22px;color:#b45309}
#printArea .pf-head .biz .tag{font-size:10px;color:#666;margin-top:2px}
#printArea .pf-head .biz .info{font-size:10px;line-height:1.5;margin-top:6px}
#printArea .pf-head .pf-num{text-align:right;border:2px solid #f59e0b;padding:8px 12px;border-radius:4px}
#printArea .pf-head .pf-num .lbl{font-size:9px;color:#666;text-transform:uppercase}
#printArea .pf-head .pf-num .num{font-size:16px;font-weight:800;color:#b45309}
#printArea .pf-head .pf-num .fch{font-size:10px;color:#666;margin-top:4px}
#printArea .pf-cli{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;font-size:11px}
#printArea .pf-cli .blk{border:1px solid #ddd;padding:8px;border-radius:4px}
#printArea .pf-cli .blk h3{margin:0 0 6px;font-size:10px;color:#b45309;text-transform:uppercase;border-bottom:1px solid #eee;padding-bottom:3px}
#printArea table.pf-items{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px}
#printArea table.pf-items th{background:#f59e0b;color:#000;padding:7px 6px;text-align:left;font-size:10px;text-transform:uppercase}
#printArea table.pf-items td{padding:6px;border-bottom:1px solid #eee;vertical-align:top}
#printArea table.pf-items .num-col{text-align:right;white-space:nowrap}
#printArea table.pf-items .center{text-align:center}
#printArea .pf-tot{margin-left:auto;width:50%;font-size:12px}
#printArea .pf-tot .row{display:flex;justify-content:space-between;padding:4px 8px}
#printArea .pf-tot .row.big{background:#f59e0b;color:#000;font-weight:800;font-size:14px;padding:8px;border-radius:4px;margin-top:4px}
#printArea .pf-notes{margin-top:14px;font-size:10px;color:#444;border-top:1px dashed #ccc;padding-top:8px}
#printArea .pf-foot{margin-top:18px;border-top:2px solid #f59e0b;padding-top:8px;text-align:center;font-size:9px;color:#666;font-style:italic}
.print-controls{position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;z-index:50}
.print-controls .btn{flex:1}
.proforma-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.proforma-actions .btn{width:auto;padding:8px 12px;font-size:12px}
.proforma-status{font-size:11px;color:var(--muted);margin-top:8px}
@media (max-width:480px){.row2{grid-template-columns:1fr}.header h1{font-size:14px}.view{padding:12px}.card{padding:12px}.data-table{font-size:11px}.data-table th,.data-table td{padding:5px 4px}}
@media (min-width:481px){#printArea{display:block}}
</style>
</head>
<body>
<div style="padding:40px;color:#e5e7eb;font-family:'Segoe UI',sans-serif">
  <h1 style="color:#f59e0b">Versión nueva en preparación</h1>
  <p>Esta versión completa ya quedó reservada para migrar la pantalla de servicios. Si la necesitas como principal, sigo con el reemplazo final en el siguiente paso.</p>
</div>
</body>
</html>
