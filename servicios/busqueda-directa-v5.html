<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alianza - Buscador V5 (Soluciأ³n Definitiva)</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        #loading { text-align: center; padding: 50px; color: #333; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loading">Conectando y limpiando base de datos...</div>
    <div id="content-container"></div>

    <script>
        // 1. DICCIONARIO DE ERRORES (Incluye MأپXIMA y CIGأœEأ‘AL)
        const mapaReparacion = {
            'أƒئ’أ…â€œ': 'أœ', 
            'أƒئ’أ¢â‚¬ثœ': 'أ‘', 
            'أƒئ’أ‚آ±': 'أ±', 
            'أƒâ€ڑأ‚آ°': 'آ°', 
            'Nأƒâ€ڑأ‚آ°': 'Nآ°', 
            'أƒâ€ڑأ‚': ' ', 
            'أƒئ’أ‚آ،': 'أ،', 
            'أƒئ’أ‚آ©': 'أ©', 
            'أƒئ’أ‚آ­': 'أ­', 
            'أƒئ’أ‚آ³': 'أ³', 
            'أƒئ’أ‚آ؛': 'أ؛',
            'Mأƒئ’أ¢â‚¬آ،XIMA': 'MأپXIMA',
            'أƒآ،': 'أ،', 
            'أƒآ©': 'أ©', 
            'أƒآ­': 'أ­', 
            'أƒآ³': 'أ³', 
            'أƒآ؛': 'أ؛', 
            'أƒآ±': 'أ±', 
            'أƒâ€ک': 'أ‘',
            'أƒإ“': 'أœ'
        };

        // 2. EL FILTRO MAESTRO: Intercepta la descarga de datos
        const fetchOriginal = window.fetch;
        
        window.fetch = async function(...args) {
            const respuesta = await fetchOriginal.apply(this, args);
            
            // Detectar si la peticiأ³n es hacia tu base de datos de Google Script
            if (args[0] && typeof args[0] === 'string' && args[0].includes('script.google.com')) {
                const clon = respuesta.clone();
                try {
                    let textoJson = await clon.text();
                    
                    // Limpiamos los datos crudos ANTES de que el sistema los procese
                    for (const [error, correcto] of Object.entries(mapaReparacion)) {
                        textoJson = textoJson.split(error).join(correcto);
                    }
                    
                    // Entregamos los datos reparados
                    return new Response(textoJson, {
                        status: respuesta.status,
                        statusText: respuesta.statusText,
                        headers: respuesta.headers
                    });
                } catch(e) {
                    console.error("Error al interceptar datos", e);
                }
            }
            return respuesta;
        };

        // 3. INICIAR EL SISTEMA
        async function iniciar() {
            try {
                // Cargamos tu diseأ±o base
                const res = await fetchOriginal('busqueda-directa-v2.html');
                let html = await res.text();
                
                // Limpiamos tambiأ©n el HTML base
                for (const [error, correcto] of Object.entries(mapaReparacion)) {
                    html = html.split(error).join(correcto);
                }

                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('content-container');
                container.innerHTML = html;

                // Reactivamos los scripts de la pأ،gina
                container.querySelectorAll('script').forEach(s => {
                    const nuevo = document.createElement('script');
                    if (s.src) nuevo.src = s.src;
                    nuevo.textContent = s.textContent;
                    document.body.appendChild(nuevo);
                });
            } catch (e) {
                document.getElementById('loading').innerText = "Error: no se encontrأ³ busqueda-directa-v2.html";
            }
        }

        iniciar();
    </script>
</body>
</html>
