  function fixTextString(value){
    let text = repairEncoding(String(value == null ? '' : value));

  function cleanBrokenValue(value){

  function cleanseNodeText(root){
    if(!root) return;
    const walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node){
        const parent=node && node.parentNode;
        if(!parent) return NodeFilter.FILTER_REJECT;
        const tag=(parent.tagName||'').toUpperCase();
        if(tag==='SCRIPT' || tag==='STYLE') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const textNodes=[];
    while(walker.nextNode()){
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach(function(node){
      const fixed=fixTextString(node.nodeValue);
      if(fixed!==node.nodeValue){

    if(typeof window.SyncManager === 'undefined') {
      class SyncManager {
        constructor() {
          this.queue = [];
          this.lastSync = null;
          this.isSyncing = false;
          this.loadState();
          this.startAutoSync();
        }

        loadState() {
          try {
            const saved = localStorage.getItem('syncState_servicios');
            if (saved) {
              const state = JSON.parse(saved);
              this.queue = state.queue || [];
              this.lastSync = state.lastSync;
            }
          } catch (e) {
            console.error('Error loading sync state:', e);
          }
        }

        saveState() {
          try {
            localStorage.setItem('syncState_servicios', JSON.stringify({
              queue: this.queue,
              lastSync: this.lastSync
            }));
          } catch (e) {
            console.error('Error saving sync state:', e);
          }
        }

        addOperation(action, target, rowNum, row) {
          const op = {
            id: 'op-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9),
            timestamp: new Date().toISOString(),
            action,
            target,
            rowNum,
            row: JSON.parse(JSON.stringify(row)),
            status: 'pending',
            retryCount: 0
          };
          this.queue.push(op);
          this.saveState();
          this.processQueue();
          return op;
        }

        startAutoSync() {
          setInterval(() => {
            if (navigator.onLine && !this.isSyncing) {
              this.processQueue();
            }
          }, 5000);

          window.addEventListener('online', () => {
            this.showNotif('✓ Conexión restaurada, sincronizando...');
            this.processQueue();
          });

          window.addEventListener('offline', () => {
            this.showNotif('⚠️ Sin conexión - cambios se guardarán localmente');
          });
        }

        showNotif(msg) {
          if(typeof window.toast === 'function') {
            window.toast(msg);
          } else {
            console.log(msg);
          }
        }

        async processQueue() {
          if (this.isSyncing || !navigator.onLine || this.queue.length === 0) {
            return;
          }

          this.isSyncing = true;
          try {
            while (this.queue.length > 0) {
              const op = this.queue[0];
              try {
                // Simulación de sincronización
                // En producción, esto enviaría a la API del Apps Script
                await new Promise(resolve => setTimeout(resolve, 500));

                this.queue.shift();
                this.saveState();
              } catch (err) {
                op.retryCount++;
                if (op.retryCount < 5) {
                  await new Promise(resolve =>
                    setTimeout(resolve, 1000 * Math.pow(2, op.retryCount - 1))
                  );
                } else {
                  op.status = 'failed';
                  op.lastError = err.message;
                  this.queue.shift();
                  this.saveState();
                  this.showNotif('Error sincronizando: ' + err.message);
                }
              }
            }
            this.lastSync = new Date().toISOString();
            this.saveState();
          } finally {
            this.isSyncing = false;
          }
        }

        getQueueSize() {
          return this.queue.length;
        }
      }

      window.SyncManager = SyncManager;
      window.serviciosSyncManager = new SyncManager();
    }
  });
})();

      var modalHtml = "\n<div id=\"evOverlay\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;padding:20px;overflow:auto\"><div style=\"background:#161e2e;border:1px solid #2a3850;border-radius:12px;max-width:900px;width:100%;max-height:90vh;overflow:auto;padding:20px;color:#e5e7eb\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #2a3850;padding-bottom:10px\"><h2 style=\"margin:0;color:#f59e0b\">Editar Vehículo</h2><button id=\"evClose\" style=\"background:#444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer\">Cerrar</button></div><div id=\"evGrid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\"><div class=\"ev-field\"><label>Placa</label><input data-evk=\"placa\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Modelo</label><input data-evk=\"modelo\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Año</label><input data-evk=\"ano\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Combustible</label><input data-evk=\"combustible\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Chofer / Empresa</label><input data-evk=\"chofer__empresa\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>RUC</label><input data-evk=\"ruc\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Dirección</label><input data-evk=\"direccion\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Teléfono</label><input data-evk=\"telefono\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>DNI</label><input data-evk=\"dni\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Motor</label><input data-evk=\"motor\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Caja</label><input data-evk=\"caja\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Ruta Scanner</label><input data-evk=\"ruta_scanner\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>CCA</label><input data-evk=\"cca\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>VIN</label><input data-evk=\"vin\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Versión Base</label><input data-evk=\"version_base\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Ubicación OBD2</label><input data-evk=\"ubicacion_obd2\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Capac. Oil</label><input data-evk=\"capac_oil\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Temperatura</label><input data-evk=\"temperatura\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Batería</label><input data-evk=\"bateria\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Tipo de Caja</label><input data-evk=\"tipo_de_caja\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>F. Gasolina Ext</label><input data-evk=\"f_gasolina_ext\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Modelo Detalle</label><input data-evk=\"modelo_detalle\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Potencia</label><input data-evk=\"potencia\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Versión Detalle</label><input data-evk=\"version_detalle\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Cilindrada</label><input data-evk=\"cilindrada\" type=\"text\" class=\"ev-input\"></div><div class=\"ev-field\"><label>Cilindro</label><input data-evk=\"cilindro\" type=\"text\" class=\"ev-input\"></div></div><div style=\"margin-top:16px;display:flex;gap:10px;justify-content:flex-end\"><button id=\"evCancel\" style=\"background:#444;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer\">Cancelar</button><button id=\"evSave\" style=\"background:#22c55e;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold\">Guardar cambios</button></div></div></div>\n<style>.ev-field label{display:block;color:#94a3b8;font-size:12px;margin-bottom:4px}.ev-input{width:100%;padding:8px;background:#0b0f17;border:1px solid #2a3850;color:#e5e7eb;border-radius:6px;text-transform:uppercase;box-sizing:border-box}</style>\n";
      document.body.insertAdjacentHTML("beforeend", modalHtml);
      document.getElementById("evClose").onclick = closeEditVehicle;
      document.getElementById("evCancel").onclick = closeEditVehicle;
      document.getElementById("evSave").onclick = saveEditVehicle;
    }

    function closeEditVehicle(){ document.getElementById("evOverlay").style.display = "none"; window.__evCurrent = null; }

    function openEditVehicle(rowNum){
      var v = (window.state && window.state.vehAll || []).find(function(x){ return x._row === rowNum; });
      if (!v) { alert("Vehiculo no encontrado: fila " + rowNum); return; }
      window.__evCurrent = v;
      EV_FIELDS.forEach(function(f){
        var inp = document.querySelector('[data-evk="'+f[0]+'"]');
        if (!inp) return;
        var val = "";
        if (typeof window.pickVehValue === "function") {
          val = window.pickVehValue(v, [f[0]]) || v[f[0]] || "";
        } else {
          val = v[f[0]] != null ? v[f[0]] : "";
        }
        inp.value = val == null ? "" : String(val);
      });
      var ovl = document.getElementById("evOverlay");
      ovl.style.display = "flex";
    }
    window.openEditVehicle = openEditVehicle;
    window.closeEditVehicle = closeEditVehicle;

    async function saveEditVehicle(){
      var cur = window.__evCurrent;
      if (!cur) { alert("No hay vehiculo seleccionado"); return; }
      var row = {};
      EV_FIELDS.forEach(function(f){
        var inp = document.querySelector('[data-evk="'+f[0]+'"]');
        if (inp) row[f[0]] = (inp.value || "").toString().toUpperCase().trim();
      });
      if (!row.placa) { alert("La placa no puede estar vacia"); return; }
      try {
        var btn = document.getElementById("evSave");
        btn.disabled = true; btn.textContent = "Guardando...";
        var data = await window.callAS({ action: "update", target: "veh", rowNum: cur._row, row: row });
        if (!data || !data.ok) throw new Error((data && data.error) || "Error al actualizar");
        Object.keys(row).forEach(function(k){ cur[k] = row[k]; });
        if (typeof window.renderVehTable === "function") window.renderVehTable();
        closeEditVehicle();
        alert("Vehiculo actualizado: " + row.placa);
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        var btn2 = document.getElementById("evSave");
        if (btn2) { btn2.disabled = false; btn2.textContent = "Guardar cambios"; }
      }
    }
    window.saveEditVehicle = saveEditVehicle;

    // Envolver renderVehTable para anadir columna y boton
    var originalRender = window.renderVehTable;
    window.renderVehTable = function(){
      var ret = originalRender.apply(this, arguments);
      try {
        var box = document.getElementById("vehTableBox");
        if (!box) return ret;
        var thead = box.querySelector("thead tr");
        if (thead && !thead.querySelector(".veh-edit-col")) {
          var th = document.createElement("th");
          th.className = "veh-edit-col";
          th.textContent = "Acción";
          thead.appendChild(th);
        }
        var rows = box.querySelectorAll("tbody tr");
        var vehAll = (window.state && window.state.vehAll) || [];
        rows.forEach(function(tr){
          if (tr.querySelector(".veh-edit-cell")) return;
          var placaCell = tr.querySelector(".placa-cell");
          var placa = placaCell ? placaCell.textContent.trim() : "";
          var match = vehAll.find(function(v){ return (v.placa || "").toString().trim().toUpperCase() === placa.toUpperCase(); });
          var rowNum = match ? match._row : null;
          var td = document.createElement("td");
          td.className = "veh-edit-cell";
          if (rowNum) {
            var b = document.createElement("button");
            b.textContent = "✏️ Editar";
            b.style.cssText = "background:#3b82f6;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px";
            b.onclick = function(){ window.openEditVehicle(rowNum); };
            td.appendChild(b);
          } else {
            td.textContent = "—";
          }
          tr.appendChild(td);
        });
      } catch (e) { console.warn("Error añadiendo botones de edición:", e); }
      return ret;
    };
    // Forzar re-render si la tabla ya estaba dibujada
    try { window.renderVehTable(); } catch(e){}
  }

  // Reintentar instalacion hasta que las funciones existan
  var __evTries = 0;
  var __evTimer = setInterval(function(){
    __evTries++;
    if (typeof window.renderVehTable === "function" && typeof window.callAS === "function") {
      installVehicleEditor();
      clearInterval(__evTimer);
    } else if (__evTries > 60) {
      clearInterval(__evTimer);
    }
  }, 500);
  // ====== FIN: Edicion de vehiculos (parche) ======

})();
</script>
</body>
</html>
