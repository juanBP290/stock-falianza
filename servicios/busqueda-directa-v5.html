<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alianza - Buscador V5</title>
</head>
<body>
    <div id="loading" style="text-align:center; padding:50px; font-family:sans-serif; color:#666;">
        Cargando sistema de Factoría Alianza...
    </div>
    <div id="content-container"></div>

    <script>
        // Diccionario completo para limpiar las letras raras
        const correcciones = {
            'Ãœ': 'Ü', 'Ã‘': 'Ñ', 'Â°': '°', 'Ã±': 'ñ', 'Ã¡': 'á', 
            'Ã©': 'é', 'Ã­': 'í', 'Ã³': 'ó', 'Ãº': 'ú', 'Ã': 'í',
            'NÂ°': 'N°', 'NÃ‚Â°': 'N°', 'Ã‚Â': ' '
        };

        function limpiarTexto(texto) {
            if (!texto || typeof texto !== 'string') return texto;
            let resultado = texto;
            for (const [mal, bien] of Object.entries(correcciones)) {
                resultado = resultado.split(mal).join(bien);
            }
            return resultado;
        }

        function corregirPantalla() {
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let nodo;
            while (nodo = walker.nextNode()) {
                const limpio = limpiarTexto(nodo.nodeValue);
                if (nodo.nodeValue !== limpio) nodo.nodeValue = limpio;
            }
        }

        async function cargarSistema() {
            try {
                const respuesta = await fetch('busqueda-directa-v2.html');
                const html = await respuesta.text();
                
                document.getElementById('loading').style.display = 'none';
                const contenedor = document.getElementById('content-container');
                contenedor.innerHTML = html;

                // Activar los scripts de la página base
                contenedor.querySelectorAll('script').forEach(viejoScript => {
                    const nuevoScript = document.createElement('script');
                    Array.from(viejoScript.attributes).forEach(attr => nuevoScript.setAttribute(attr.name, attr.value));
                    nuevoScript.textContent = viejoScript.textContent;
                    document.body.appendChild(nuevoScript);
                });

                // Corregir letras cada vez que el buscador traiga datos nuevos
                const observador = new MutationObserver(corregirPantalla);
                observador.observe(document.body, { childList: true, subtree: true });
                
                corregirPantalla();

            } catch (error) {
                document.getElementById('loading').innerText = "Error: Asegúrate que busqueda-directa-v2.html esté en la misma carpeta.";
            }
        }

        cargarSistema();
    </script>
</body>
</html>
