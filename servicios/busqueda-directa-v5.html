<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alianza - Buscador V5 (FIX)</title>
    <style>
        body { font-family: sans-serif; }
        #loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    <div id="loading">Cargando y corrigiendo textos...</div>
    <div id="content-container"></div>

    <script>
        // Diccionario Maestro de Reparaciأ³n (Basado en tu imagen)
        const mapaReparacion = {
            'أƒئ’أ…â€œ': 'أœ',    // Para CIGأœEأ‘AL
            'أƒئ’أ¢â‚¬ثœ': 'أ‘',   // Para CIGأœEأ‘AL
            'أƒئ’أ‚آ±': 'أ±',
            'أƒâ€ڑأ‚آ°': 'آ°',    // Para Nآ°
            'Nأƒâ€ڑأ‚آ°': 'Nآ°',
            'أƒâ€ڑأ‚': '',      // Para espacios fantasmas (como en LEVA)
            'أƒئ’أ‚آ،': 'أ،',
            'أƒئ’أ‚آ©': 'أ©',
            'أƒئ’أ‚آ­': 'أ­',
            'أƒئ’أ‚آ³': 'أ³',
            'أƒئ’أ‚آ؛': 'أ؛',
            'أƒآ،': 'أ،',
            'أƒآ©': 'أ©',
            'أƒآ­': 'أ­',
            'أƒآ³': 'أ³',
            'أƒآ؛': 'أ؛',
            'أƒآ±': 'أ±',
            'أƒâ€ک': 'أ‘'
        };

        function limpiarTodo(texto) {
            if (!texto || typeof texto !== 'string') return texto;
            let str = texto;
            // Aplicar correcciones del mapa
            for (const [error, correcto] of Object.entries(mapaReparacion)) {
                str = str.split(error).join(correcto);
            }
            return str;
        }

        // Esta funciأ³n escanea toda la pantalla y limpia cada palabra
        function corregirPantalla() {
            const elementos = document.querySelectorAll('body *:not(script):not(style)');
            elementos.forEach(el => {
                if (el.childNodes.length > 0) {
                    el.childNodes.forEach(nodo => {
                        if (nodo.nodeType === 3) { // Si es un nodo de texto
                            const textoLimpio = limpiarTodo(nodo.nodeValue);
                            if (nodo.nodeValue !== textoLimpio) {
                                nodo.nodeValue = textoLimpio;
                            }
                        }
                    });
                }
            });
        }

        async function iniciar() {
            try {
                // Cargamos la base V2
                const res = await fetch('busqueda-directa-v2.html');
                const html = await res.text();
                
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('content-container');
                container.innerHTML = html;

                // Ejecutamos los scripts internos de la V2
                container.querySelectorAll('script').forEach(s => {
                    const nuevo = document.createElement('script');
                    if (s.src) nuevo.src = s.src;
                    nuevo.textContent = s.textContent;
                    document.body.appendChild(nuevo);
                });

                // OBSERVADOR: Detecta cuando el buscador pone datos nuevos y los limpia
                const observer = new MutationObserver(() => {
                    corregirPantalla();
                });

                observer.observe(document.body, { childList: true, subtree: true });
                
                // Limpieza inicial y repetitiva (para asegurar)
                corregirPantalla();
                setInterval(corregirPantalla, 1000); // Re-limpia cada segundo por si acaso

            } catch (e) {
                document.getElementById('loading').innerText = "Error de conexiأ³n.";
            }
        }

        iniciar();
    </script>
</body>
</html>
